<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Selo · COMPRE 1 LEVE +11</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', 'Outfit', system-ui, sans-serif;
            background: #0b0e14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #eef2fb;
        }
        .card {
            max-width: 1000px;
            width: 100%;
            background: #131720;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 6px 12px rgba(0, 0, 0, 0.4);
            padding: 32px;
            border: 1px solid #2a3342;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #9aa4b8;
            margin-bottom: 28px;
            font-size: 1rem;
            border-left: 4px solid #f97316;
            padding-left: 16px;
        }
        .upload-area {
            border: 2px dashed #2e3a4a;
            border-radius: 24px;
            padding: 36px 24px;
            text-align: center;
            background: #1a212b;
            cursor: pointer;
            margin-bottom: 28px;
            transition: all 0.2s;
        }
        .upload-area:hover, .upload-area.dragover {
            border-color: #f97316;
            background: #1f2a36;
        }
        .upload-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.9; }
        .upload-text { font-weight: 500; color: #e0e7f0; margin-bottom: 6px; }
        .upload-hint { color: #8895aa; font-size: 0.9rem; }
        #fileInput { display: none; }
        .badge-info {
            background: #1e2a3a;
            border-radius: 40px;
            padding: 10px 18px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #fbbf24;
            font-weight: 500;
            margin-bottom: 20px;
            border: 1px solid #3a485c;
        }
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            margin: 24px 0;
        }
        .preview-item {
            background: #1c2532;
            border-radius: 18px;
            padding: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            border: 1px solid #2e3c4e;
            position: relative;
        }
        .preview-item canvas {
            width: 100%;
            height: auto;
            border-radius: 12px;
            display: block;
            border: 1px solid #3a4a5e;
            background: #0f151c;
        }
        .preview-name {
            font-size: 0.75rem;
            color: #b1c0d4;
            margin-top: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
        }
        .remove-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(20, 28, 38, 0.95);
            border-radius: 30px;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #4b5e78;
            color: #f87171;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            transition: all 0.15s;
        }
        .remove-btn:hover {
            background: #3a2a2e;
            border-color: #f87171;
            color: #ffb0b0;
        }
        .action-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            justify-content: space-between;
            margin-top: 16px;
        }
        .btn {
            border: none;
            background: transparent;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            border: 1px solid transparent;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }
        .btn-primary {
            background: #f97316;
            color: white;
            border: none;
            box-shadow: 0 8px 16px -6px rgba(249, 115, 22, 0.3);
        }
        .btn-primary:hover:not(:disabled) {
            background: #ea580c;
            transform: translateY(-1px);
        }
        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background: #6b4423;
        }
        .btn-secondary {
            background: #202a36;
            border: 1px solid #3e5066;
            color: #e0e7f0;
        }
        .btn-secondary:hover:not(:disabled) {
            background: #2a3647;
            border-color: #5f7796;
        }
        .btn-secondary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .status-message { color: #b7c5da; font-size: 0.9rem; }
        .footer-note {
            margin-top: 24px;
            font-size: 0.8rem;
            color: #6f7f94;
            text-align: center;
            border-top: 1px solid #253040;
            padding-top: 18px;
        }
        .badge-preview-selo {
            background: #f97316;
            color: #0f0f0f;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            border: 1px solid #ffb45b;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a212b; }
        ::-webkit-scrollbar-thumb { background: #3b4a60; border-radius: 6px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
<div class="card">
    <h1>
        <span>🛍️ Selo Oferta</span>
        <span class="badge-preview-selo">COMPRE 1 LEVE +11 GRÁTIS</span>
    </h1>
    <div class="subtitle">Arraste até 5 imagens · Máximo 9000x9000 px · Selo no canto superior esquerdo</div>

    <div class="upload-area" id="dropZone">
        <div class="upload-icon">📸</div>
        <div class="upload-text">Clique ou arraste imagens aqui</div>
        <div class="upload-hint">JPG, PNG, WEBP · Máximo 5 arquivos</div>
    </div>
    <input type="file" id="fileInput" accept="image/jpeg, image/png, image/webp, image/bmp, image/gif" multiple>

    <div id="statusArea" class="badge-info">
        <span>🖼️</span> <span id="imageCount">0</span>/5 imagens carregadas
    </div>

    <div id="previewGrid" class="preview-grid"></div>

    <div class="action-bar">
        <div>
            <button class="btn btn-secondary" id="clearBtn" disabled>🗑️ Limpar tudo</button>
        </div>
        <div style="display: flex; gap: 12px; align-items: center;">
            <span class="status-message" id="processStatus"></span>
            <button class="btn btn-primary" id="downloadBtn" disabled>⬇️ Baixar Fotos.zip</button>
        </div>
    </div>
    <div class="footer-note">
        As imagens serão redimensionadas para no máximo 9000×9000 pixels (proporcional).
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ---------- CONFIGURAÇÃO ----------
        const MAX_IMAGES = 5;
        const MAX_DIMENSION = 9000; // largura/altura máxima em pixels
        const SELO_URL = 'https://i.imgur.com/WsHYByG.png';
        
        let images = []; // { id, file, dataUrl, processedBlob, width, height }
        let seloImage = null;

        // DOM elements
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const previewGrid = document.getElementById('previewGrid');
        const imageCountSpan = document.getElementById('imageCount');
        const clearBtn = document.getElementById('clearBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const processStatus = document.getElementById('processStatus');

        // ---------- CARREGAR SELO ----------
        function carregarSelo() {
            return new Promise((resolve, reject) => {
                if (seloImage && seloImage.complete && seloImage.naturalWidth > 0) {
                    resolve(seloImage);
                    return;
                }
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => {
                    seloImage = img;
                    resolve(img);
                };
                img.onerror = () => reject(new Error('Não foi possível carregar o selo.'));
                img.src = SELO_URL;
            });
        }

        // ---------- UI ----------
        function updateUI() {
            const count = images.length;
            imageCountSpan.textContent = count;
            clearBtn.disabled = count === 0;
            downloadBtn.disabled = count === 0;
            renderPreviewGrid();
        }

        // Redimensiona mantendo proporção até no máximo MAX_DIMENSION
        function calcularNovasDimensoes(width, height) {
            if (width <= MAX_DIMENSION && height <= MAX_DIMENSION) {
                return { width, height };
            }
            const ratio = Math.min(MAX_DIMENSION / width, MAX_DIMENSION / height);
            return {
                width: Math.round(width * ratio),
                height: Math.round(height * ratio)
            };
        }

        // Desenha o selo no canvas (com dimensões já definidas)
        function desenharSelo(ctx, canvasWidth, canvasHeight, seloImg) {
            const baseSize = Math.min(canvasWidth * 0.22, canvasHeight * 0.22);
            const seloWidth = Math.max(100, Math.min(200, baseSize));
            const proporcao = seloImg.naturalHeight / seloImg.naturalWidth;
            const seloHeight = seloWidth * proporcao;
            
            const padding = Math.max(12, Math.round(canvasWidth * 0.025));
            const x = padding;
            const y = padding;
            
            ctx.save();
            ctx.shadowColor = 'rgba(0,0,0,0.4)';
            ctx.shadowBlur = 12;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;
            ctx.drawImage(seloImg, x, y, seloWidth, seloHeight);
            ctx.restore();
        }

        // Processa UMA imagem: redimensiona se necessário, aplica selo
        async function processImage(file, seloImg) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                const reader = new FileReader();
                
                reader.onload = (e) => { img.src = e.target.result; };
                
                img.onload = () => {
                    try {
                        // Calcular novas dimensões (máx 9000x9000)
                        const dims = calcularNovasDimensoes(img.width, img.height);
                        
                        const canvas = document.createElement('canvas');
                        canvas.width = dims.width;
                        canvas.height = dims.height;
                        const ctx = canvas.getContext('2d');
                        
                        // Desenhar imagem redimensionada
                        ctx.drawImage(img, 0, 0, dims.width, dims.height);
                        
                        // Aplicar selo
                        desenharSelo(ctx, canvas.width, canvas.height, seloImg);
                        
                        // Converter para blob JPEG
                        canvas.toBlob((blob) => {
                            if (!blob) {
                                reject(new Error('Falha ao gerar blob'));
                                return;
                            }
                            const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
                            resolve({
                                blob: blob,
                                dataUrl: dataUrl,
                                width: canvas.width,
                                height: canvas.height
                            });
                        }, 'image/jpeg', 0.92);
                        
                    } catch (err) {
                        reject(err);
                    }
                };
                
                img.onerror = () => reject(new Error('Falha ao carregar imagem'));
                reader.onerror = () => reject(new Error('Erro ao ler arquivo'));
                reader.readAsDataURL(file);
            });
        }

        // Adiciona novas imagens
        async function addImages(files) {
            if (!files || files.length === 0) return;
            
            const imageFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
            if (imageFiles.length === 0) {
                alert('Por favor, selecione apenas arquivos de imagem.');
                return;
            }
            
            const availableSlots = MAX_IMAGES - images.length;
            if (availableSlots <= 0) {
                alert(`Você já tem o máximo de ${MAX_IMAGES} imagens.`);
                return;
            }
            
            const filesToAdd = imageFiles.slice(0, availableSlots);
            
            processStatus.textContent = `Processando ${filesToAdd.length} imagem(ns)...`;
            downloadBtn.disabled = true;
            clearBtn.disabled = true;
            
            try {
                const seloImg = await carregarSelo();
                
                for (const file of filesToAdd) {
                    const processed = await processImage(file, seloImg);
                    const imageObj = {
                        id: Date.now() + Math.random().toString(36),
                        file: file,
                        dataUrl: processed.dataUrl,
                        processedBlob: processed.blob,
                        width: processed.width,
                        height: processed.height
                    };
                    images.push(imageObj);
                    updateUI();
                }
                processStatus.textContent = `${images.length} imagens prontas.`;
            } catch (error) {
                console.error(error);
                alert('Erro ao processar: ' + error.message);
                processStatus.textContent = 'Erro no processamento.';
            } finally {
                updateUI();
                if (images.length) processStatus.textContent = `${images.length} imagens prontas.`;
                else processStatus.textContent = '';
            }
        }

        function renderPreviewGrid() {
            if (images.length === 0) {
                previewGrid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:#8895aa; padding:24px;">Nenhuma imagem carregada</div>`;
                return;
            }
            
            let html = '';
            images.forEach((img, index) => {
                html += `
                    <div class="preview-item">
                        <div class="remove-btn" data-index="${index}" title="Remover">✕</div>
                        <canvas width="${img.width}" height="${img.height}" style="width:100%; height:auto; border-radius:12px;"></canvas>
                        <div class="preview-name" title="${img.file.name}">${img.file.name}</div>
                    </div>
                `;
            });
            
            previewGrid.innerHTML = html;
            
            images.forEach((img, idx) => {
                const canvas = previewGrid.querySelectorAll('.preview-item canvas')[idx];
                if (canvas) {
                    const ctx = canvas.getContext('2d');
                    const previewImg = new Image();
                    previewImg.onload = () => {
                        canvas.width = img.width;
                        canvas.height = img.height;
                        ctx.drawImage(previewImg, 0, 0);
                    };
                    previewImg.src = img.dataUrl;
                }
            });
            
            document.querySelectorAll('.remove-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const index = parseInt(btn.dataset.index, 10);
                    removeImageAtIndex(index);
                });
            });
        }

        function removeImageAtIndex(index) {
            if (index >= 0 && index < images.length) {
                images.splice(index, 1);
                updateUI();
                processStatus.textContent = images.length ? `${images.length} imagens prontas.` : '';
            }
        }

        function clearAllImages() {
            if (images.length === 0) return;
            images = [];
            updateUI();
            processStatus.textContent = '';
            previewGrid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:#8895aa; padding:24px;">Nenhuma imagem carregada</div>`;
        }

        async function downloadZip() {
            if (images.length === 0) return;
            
            downloadBtn.disabled = true;
            processStatus.textContent = 'Gerando ZIP...';
            
            try {
                const zip = new JSZip();
                
                images.forEach((img) => {
                    let fileName = img.file.name;
                    const baseName = fileName.replace(/\.[^/.]+$/, "");
                    const finalName = `${baseName}_selo.jpg`;
                    zip.file(finalName, img.processedBlob, { binary: true });
                });
                
                const content = await zip.generateAsync({ 
                    type: 'blob',
                    compression: 'DEFLATE',
                    compressionOptions: { level: 6 }
                });
                
                const url = URL.createObjectURL(content);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'Fotos.zip';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                processStatus.textContent = '✅ ZIP gerado com sucesso!';
            } catch (err) {
                console.error(err);
                alert('Erro ao gerar ZIP: ' + err.message);
                processStatus.textContent = 'Erro no ZIP.';
            } finally {
                downloadBtn.disabled = false;
            }
        }

        // ---------- EVENTOS ----------
        dropZone.addEventListener('click', () => fileInput.click());
        
        fileInput.addEventListener('change', (e) => {
            if (fileInput.files.length) {
                addImages(fileInput.files);
                fileInput.value = '';
            }
        });
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length) addImages(files);
        });
        
        clearBtn.addEventListener('click', clearAllImages);
        downloadBtn.addEventListener('click', downloadZip);
        
        document.body.addEventListener('dragover', (e) => e.preventDefault());
        document.body.addEventListener('drop', (e) => e.preventDefault());
        
        // Pré-carregar selo
        carregarSelo().catch(err => console.warn('Selo não carregado antecipadamente:', err));
        
        updateUI();
    })();
</script>
</body>
</html>
